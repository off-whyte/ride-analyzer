name: Analyze Ride

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python src/action_runner.py
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}

      - run: |
          git config user.name "Ride Analyzer Bot"
          git config user.email "bot@noreply.github.com"
          git pull --rebase
          git add data/
          git diff --staged --quiet || git commit -m "Analysis: $(date -u +%Y-%m-%d)"
          git push
